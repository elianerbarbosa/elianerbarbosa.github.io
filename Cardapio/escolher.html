<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="carrossel2.css">
</head>

<body>
    <header>
        <!-- Conteúdo do header pode ser adicionado aqui -->
    </header>
    
    <div class="container">
        <h1 class="main-heading">
            Faça seu pedido!
        </h1>
          
        <div class="content">
            <!-- frase no centro do carrossel -->
            <div class="carousel-content">
                <!-- Adicione texto aqui se necessário -->
            </div>
            
            <div class="slideshow">
                <!-- todas as imagens do carrossel -->
                <div class="slideshow-wrapper">
                    <div class="slide">
                        <img src="./img/h17.png" alt="Hambúrguer 17" class="slide-img">
                    </div>
                    <div class="slide">
                        <img src="./img/h15.png" alt="Hambúrguer 15" class="slide-img">
                    </div>
                    <div class="slide">
                        <img src="./img/h14.png" alt="Hambúrguer 14" class="slide-img">
                    </div>
                    <div class="slide">
                        <img src="./img/h12.png" alt="Hambúrguer 12" class="slide-img">
                    </div>
                    <div class="slide">
                        <img src="./img/h11.png" alt="Hambúrguer 11" class="slide-img">
                    </div>
                    <div class="slide">
                        <img src="./img/bebida01.png" alt="Bebida 01" class="slide-img">
                    </div>
                    <div class="slide">
                        <img src="./img/bebida02.png" alt="Bebida 02" class="slide-img">
                    </div>
                    <div class="slide">
                        <img src="./img/bebida03.png" alt="Bebida 03" class="slide-img">
                    </div>
                    <div class="slide">
                        <img src="./img/batata01.png" alt="Batata 01" class="slide-img">
                    </div>
                    <div class="slide">
                        <img src="./img/batata02.png" alt="Batata 02" class="slide-img">
                    </div>
                </div>
                
                <!-- botões de controle do carrossel -->
                <button class="slide-btn slide-btn-1"></button>
                <button class="slide-btn slide-btn-2"></button>
                <button class="slide-btn slide-btn-3"></button>
                <button class="slide-btn slide-btn-4"></button>
                <button class="slide-btn slide-btn-5"></button>
                <button class="slide-btn slide-btn-6"></button>
                <button class="slide-btn slide-btn-7"></button>
                <button class="slide-btn slide-btn-8"></button>
                <button class="slide-btn slide-btn-9"></button>
                <button class="slide-btn slide-btn-10"></button>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-popup-overlay/2.1.5/jquery.popupoverlay.min.js" integrity="sha512-gu0czvpcfFnRy+Dxo9M585nVnO8YbTnoFRWuSnvJVdBlaeaucDNAZUjP+IfscyQEIlUOGQLtzpVFpl32fkuKig==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="scriptform.js"></script>
</body>
</html>
