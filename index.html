<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte seu Hambúrguer - Hamburgueria Delicious</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="carrossel.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="menuhorizontal">
                <ul>
                    <li><a href="index.html">Voltar ao Cardápio</a></li>
                    <li><a href="#montar">Montar Hambúrguer</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="container-carrossel">
        <h1 class="main-heading">Monte seu Hambúrguer Perfeito!</h1>
        
        <div class="carrossel-container">
            <div class="carrossel-wrapper">
                <div class="carrossel">
                    <!-- Slides -->
                    <div class="carrossel-slide active">
                        <img src="./img/h17.png" alt="Hambúrguer 17" class="carrossel-img">
                    </div>
                    <div class="carrossel-slide">
                        <img src="./img/h15.png" alt="Hambúrguer 15" class="carrossel-img">
                    </div>
                    <div class="carrossel-slide">
                        <img src="./img/h14.png" alt="Hambúrguer 14" class="carrossel-img">
                    </div>
                    <div class="carrossel-slide">
                        <img src="./img/h12.png" alt="Hambúrguer 12" class="carrossel-img">
                    </div>
                    <div class="carrossel-slide">
                        <img src="./img/h11.png" alt="Hambúrguer 11" class="carrossel-img">
                    </div>
                    <div class="carrossel-slide">
                        <img src="./img/bebida01.png" alt="Bebida 01" class="carrossel-img">
                    </div>
                    <div class="carrossel-slide">
                        <img src="./img/bebida02.png" alt="Bebida 02" class="carrossel-img">
                    </div>
                    <div class="carrossel-slide">
                        <img src="./img/bebida03.png" alt="Bebida 03" class="carrossel-img">
                    </div>
                    <div class="carrossel-slide">
                        <img src="./img/batata01.png" alt="Batata 01" class="carrossel-img">
                    </div>
                    <div class="carrossel-slide">
                        <img src="./img/batata02.png" alt="Batata 02" class="carrossel-img">
                    </div>
                </div>
                
                <!-- Botões de navegação -->
                <button class="carrossel-btn prev-btn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="carrossel-btn next-btn">
                    <i class="fas fa-chevron-right"></i>
                </button>
                
                <!-- Indicadores -->
                <div class="carrossel-indicators">
                    <button class="carrossel-indicator active"></button>
                    <button class="carrossel-indicator"></button>
                    <button class="carrossel-indicator"></button>
                    <button class="carrossel-indicator"></button>
                    <button class="carrossel-indicator"></button>
                    <button class="carrossel-indicator"></button>
                    <button class="carrossel-indicator"></button>
                    <button class="carrossel-indicator"></button>
                    <button class="carrossel-indicator"></button>
                    <button class="carrossel-indicator"></button>
                </div>
            </div>
        </div>

        <div class="montar-pedido" id="montar">
            <h2>Monte seu Hambúrguer Personalizado</h2>
            
            <div class="resumo-pedido">
                <h3>Seu Pedido:</h3>
                <div id="resumo-conteudo">
                    <p class="empty-resumo">Selecione as opções abaixo para montar seu pedido</p>
                </div>
                <div class="total">
                    Total: <span id="total-preco">R$ 0,00</span>
                </div>
            </div>
            
            <form class="form-montar" id="form-pedido">
                <div class="form-group">
                    <label>Escolha o Pão:</label>
                    <select id="pao" data-preco="5.00">
                        <option value="" data-preco="0">Selecione o pão</option>
                        <option value="australiano" data-preco="6.00">Pão Australiano</option>
                        <option value="brioche" data-preco="5.00">Pão de Brioche</option>
                        <option value="italiano" data-preco="5.50">Pão Italiano</option>
                        <option value="gergelim" data-preco="4.50">Pão com Gergelim</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Escolha a Carne:</label>
                    <select id="carne" data-preco="15.00">
                        <option value="" data-preco="0">Selecione a carne</option>
                        <option value="bovino" data-preco="18.00">Hambúrguer Bovino (180g)</option>
                        <option value="frango" data-preco="16.00">Hambúrguer de Frango</option>
                        <option value="suino" data-preco="17.00">Hambúrguer Suíno</option>
                        <option value="vegano" data-preco="19.00">Hambúrguer Vegano</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Queijos (R$ 3,00 cada):</label>
                    <div class="checkboxes">
                        <label><input type="checkbox" name="queijo" value="cheddar" data-preco="3.00"> Cheddar</label>
                        <label><input type="checkbox" name="queijo" value="mussarela" data-preco="3.00"> Mussarela</label>
                        <label><input type="checkbox" name="queijo" value="prato" data-preco="3.00"> Prato</label>
                        <label><input type="checkbox" name="queijo" value="cream" data-preco="4.00"> Cream Cheese</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Adicionais:</label>
                    <div class="checkboxes">
                        <label><input type="checkbox" name="adicional" value="bacon" data-preco="5.00"> Bacon (R$ 5,00)</label>
                        <label><input type="checkbox" name="adicional" value="ovo" data-preco="3.50"> Ovo (R$ 3,50)</label>
                        <label><input type="checkbox" name="adicional" value="cebola" data-preco="2.50"> Cebola Caramelizada (R$ 2,50)</label>
                        <label><input type="checkbox" name="adicional" value="molho" data-preco="2.00"> Molho Especial (R$ 2,00)</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Saladas (incluídas):</label>
                    <div class="checkboxes">
                        <label><input type="checkbox" name="salada" value="alface" checked> Alface</label>
                        <label><input type="checkbox" name="salada" value="tomate" checked> Tomate</label>
                        <label><input type="checkbox" name="salada" value="cebola-roxa"> Cebola Roxa</label>
                        <label><input type="checkbox" name="salada" value="picles"> Picles</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Bebida:</label>
                    <select id="bebida" data-preco="0">
                        <option value="" data-preco="0">Sem bebida</option>
                        <option value="coca" data-preco="8.00">Coca-Cola 500ml (R$ 8,00)</option>
                        <option value="guarana" data-preco="7.50">Guaraná Antarctica 500ml (R$ 7,50)</option>
                        <option value="suco" data-preco="6.00">Suco Natural 300ml (R$ 6,00)</option>
                        <option value="agua" data-preco="4.00">Água Mineral 500ml (R$ 4,00)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Acompanhamento:</label>
                    <select id="acompanhamento" data-preco="0">
                        <option value="" data-preco="0">Sem acompanhamento</option>
                        <option value="batata-media" data-preco="12.00">Batata Frita Média (R$ 12,00)</option>
                        <option value="batata-grande" data-preco="15.00">Batata Frita Grande (R$ 15,00)</option>
                        <option value="onion" data-preco="14.00">Onion Rings (R$ 14,00)</option>
                        <option value="salada" data-preco="10.00">Salada Caesar (R$ 10,00)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-finalizar">Finalizar Pedido - <span id="preco-final">R$ 0,00</span></button>
            </form>
        </div>
    </div>

                </span>
                <span class="fa-stack fa-lg">
                    <i class="fa fa-circle fa-stack-2x"></i>
                    <a href="https://www.linkedin.com/in/elianeramosbarbosa-erb"><i class="fa fa-linkedin fa-stack-1x fa-inverse"></i></a>
                </span>

            </li>

    </div>

</body>
